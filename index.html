<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Дашборд · Dr. Kazarnovskis & Partners</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      // Set theme before first paint. Light is the default; dark only when explicitly chosen.
      try {
        var t = JSON.parse(localStorage.getItem('kazdash') || 'null');
        var pref = t && t.settings && t.settings.theme;
        document.documentElement.setAttribute('data-theme', pref === 'dark' ? 'dark' : 'light');
      } catch (e) {}
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
